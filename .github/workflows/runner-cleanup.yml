name: Runner Cleanup

on:
  schedule:
    # Every Sunday at 3am UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: [self-hosted, engram, isolated]
    steps:
      - name: Docker cleanup
        run: |
          echo "=== Before ==="
          docker system df

          # 1. Remove stopped containers + their volumes
          docker container prune -f 2>/dev/null || true

          # 2. Remove dangling volumes (anonymous volumes from dead containers)
          docker volume prune -f 2>/dev/null || true

          # 3. Remove dangling images (untagged layers)
          docker image prune -f 2>/dev/null || true

          # 4. Keep only latest 3 GHCR engram release tags
          docker images --format '{{.Repository}}:{{.Tag}}' \
            --filter "reference=ghcr.io/rasbandit/engram:*" \
            | grep -v ':latest$' \
            | tail -n +3 \
            | xargs -r docker rmi 2>/dev/null || true

          # 5. Keep only latest CI cache image
          docker images --format '{{.Repository}}:{{.Tag}}' \
            --filter "reference=engram-ci:*" \
            | tail -n +2 \
            | xargs -r docker rmi 2>/dev/null || true

          # 6. Remove stale per-run images that slipped through teardown (cancelled jobs)
          docker images --format '{{.Repository}}:{{.Tag}}' \
            --filter "reference=engram-ci-*-engram:latest" \
            | xargs -r docker rmi 2>/dev/null || true

          # 7. Prune build cache — keep max 2GB, nuke the rest
          # --mount=type=cache entries stay "active" indefinitely, so age-based
          # filters don't work. Use --all to reclaim everything, then rebuild
          # cache naturally on next CI run.
          docker builder prune --all --keep-storage=2gb -f 2>/dev/null || true

          # 8. Clean Bun .node cache files (8.8MB each, ~400/week, never auto-cleaned)
          find /tmp -maxdepth 1 -name '.ff*.node' -delete 2>/dev/null || true

          # 9. Clean other stale /tmp files (tmpfs has user quota, fills up fast)
          find /tmp -maxdepth 1 -user "$(whoami)" -mtime +1 \
            ! -name 'claude-*' \
            ! -name 'bunx-*' \
            -exec rm -rf {} + 2>/dev/null || true
          echo "=== After ==="
          docker system df
          echo "=== /tmp ==="
          du -sh /tmp/ 2>/dev/null || true
