# Dependabot — managed by engram-infra/main/github/dependabot_config.tf.
# DO NOT EDIT IN-REPO; changes will be overwritten on next tf apply.
version: 2
updates:
  # Elixir backend deps.
  - package-ecosystem: mix
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      mix-patches:
        applies-to: version-updates
        update-types: [patch]
      mix-dev-minor:
        applies-to: version-updates
        dependency-type: development
        update-types: [minor, patch]

  # React/Vite frontend (bun.lock — bun ecosystem, not npm).
  - package-ecosystem: bun
    directory: /frontend
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      frontend-patches:
        applies-to: version-updates
        update-types: [patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
    open-pull-requests-limit: 10
    groups:
      gha-all:
        applies-to: version-updates
        update-types: [patch, minor, major]
