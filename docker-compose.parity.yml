# Parity mode override — flips the CI stack from Ollama→Voyage embeddings
# while keeping the base MinIO + Postgres services from docker-compose.ci.yml.
# Use with:
#   VOYAGE_API_KEY=xxx docker compose -f docker-compose.ci.yml -f docker-compose.parity.yml -p engram-ci up -d --build --wait
#   VOYAGE_API_KEY=xxx bash validate_parity.sh

services:
  engram:
    environment:
      EMBED_BACKEND: voyage
      EMBED_MODEL: voyage-4-large
      EMBED_DIMS: "1024"
      DOC_EMBED_MODEL: voyage-4-large
      QUERY_EMBED_MODEL: voyage-4-lite
      VOYAGE_API_KEY: "${VOYAGE_API_KEY:?Set VOYAGE_API_KEY}"
      QDRANT_COLLECTION: ci_parity_notes
