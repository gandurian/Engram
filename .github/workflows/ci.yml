name: CI

on:
  push:
    # Only fire on conventional branch prefixes + main. Prevents a fork-PR
    # branch (no prefix) from running on self-hosted runners if someone
    # ever fetches one and pushes it to the base repo to test.
    branches:
      - main
      - "bump/**"
      - "chore/**"
      - "docs/**"
      - "feat/**"
      - "fix/**"
      - "hotfix/**"
      - "perf/**"
      - "refactor/**"
      - "release/**"
      - "revert/**"
      - "security/**"
      - "test/**"
    tags-ignore: ["v*"]
  repository_dispatch:
    types: [plugin-e2e-trigger]
  workflow_dispatch:
    inputs:
      plugin_branch:
        description: "Plugin branch to test against (default: main)"
        required: false
        default: "main"

permissions:
  contents: read

# No workflow-level concurrency group: backend CI runs in parallel across
# triggers (push + plugin dispatch). Previously serialized because shared
# state collided — that's been addressed:
#   1. Dockerfile cache mounts (`mix-deps`, `mix-build`) now use sharing=locked,
#      so buildkit serializes mount access internally instead of corrupting.
#   2. Xvfb cleanup is scoped to each run's owned display range
#      (`pkill -9 -f "Xvfb :$d"` for $DISPLAY_MIN..$DISPLAY_MAX) so a
#      concurrent e2e-clerk on a different run_number bucket isn't killed.

env:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  # LOCAL_REGISTRY is set by the runner environment after running .github/setup-runner.sh
  # When set, docker-compose.ci.yml pulls images from the local FastRaid registry.
  # When unset, falls back to Docker Hub.

  # CI-only encryption master key. Ephemeral — CI databases are recreated per run,
  # so the key does not protect persistent data. Production deploys must override
  # with a secret via `fly secrets set ENCRYPTION_MASTER_KEY=...`.
  KEY_PROVIDER: "local"
  ENCRYPTION_MASTER_KEY: ${{ secrets.CI_ENCRYPTION_MASTER_KEY }}

jobs:
  # Fingerprint: content-hash of every source path that affects test
  # results. If the same hash already produced a green CI run, downstream
  # test jobs AND the image prebuild skip entirely — deploy-fastraid (on
  # main) runs against the already-validated tree.
  #
  # The merge-to-main commit produced by a squash merge has the same
  # `git ls-tree` output as the PR's head commit — same content, same
  # fingerprint, same cache key.
  fingerprint:
    # Runs on every trigger (push, repository_dispatch, workflow_dispatch).
    # Emits TWO hashes:
    #   - backend-hash: pure backend tree. Gates unit-tests/lint/e2e-local/e2e-browser/deploy.
    #   - e2e-hash:     backend-hash + plugin SHA. Gates e2e-clerk only (the plugin↔backend contract).
    # This lets a plugin-only change (same backend, different plugin SHA) miss the
    # e2e cache and re-run integration, while still hitting the backend cache so
    # pure backend jobs skip.
    runs-on: [self-hosted, linux, x64, isolated]
    outputs:
      backend-hash: ${{ steps.compute.outputs.backend-hash }}
      e2e-hash: ${{ steps.compute.outputs.e2e-hash }}
      backend-cache-hit: ${{ steps.backend-lookup.outputs.cache-hit }}
      e2e-cache-hit: ${{ steps.e2e-lookup.outputs.cache-hit }}
      plugin-sha: ${{ steps.plugin-sha.outputs.sha }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ENGRAM_CI_CLIENT_ID }}
          private-key: ${{ secrets.ENGRAM_CI_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: Engram-obsidian-sync

      - uses: actions/checkout@v6

      - name: Resolve plugin SHA
        id: plugin-sha
        env:
          DISPATCH_REF: ${{ github.event.client_payload.plugin_ref }}
          EXPLICIT_BRANCH: ${{ inputs.plugin_branch || '' }}
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Pin exact plugin commit that downstream e2e-clerk will checkout.
          # Priority matches e2e-clerk's "Checkout plugin" step:
          #   dispatch payload SHA > workflow_dispatch branch > matching branch > main HEAD
          # Failing to resolve a SHA is fatal — cache key would be empty and
          # every run would force a miss, masking the bug.
          #
          # Uses curl (not gh CLI) — the engram-isolated runners don't ship gh
          # on the default PATH for the fingerprint runner image.
          API="https://api.github.com/repos/engram-app/Engram-obsidian-sync"
          AUTH=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json")

          resolve_sha() {
            curl -fsS "${AUTH[@]}" "${API}/commits/$1" | jq -r '.sha'
          }
          branch_exists() {
            curl -fsS -o /dev/null "${AUTH[@]}" "${API}/branches/$1"
          }

          if [ -n "$DISPATCH_REF" ]; then
            SHA=$(resolve_sha "$DISPATCH_REF")
            SRC="dispatch payload"
          elif [ -n "$EXPLICIT_BRANCH" ] && [ "$EXPLICIT_BRANCH" != "main" ]; then
            SHA=$(resolve_sha "$EXPLICIT_BRANCH")
            SRC="workflow_dispatch input ($EXPLICIT_BRANCH)"
          elif branch_exists "$CURRENT_BRANCH" 2>/dev/null; then
            SHA=$(resolve_sha "$CURRENT_BRANCH")
            SRC="matching branch ($CURRENT_BRANCH)"
          else
            SHA=$(resolve_sha "main")
            SRC="plugin main HEAD"
          fi
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "::error::Could not resolve plugin SHA ($SRC)"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Plugin SHA pinned for this run: $SHA (source: $SRC)"

      - name: Compute content fingerprints
        id: compute
        env:
          PLUGIN_SHA: ${{ steps.plugin-sha.outputs.sha }}
        run: |
          # `git ls-tree -r HEAD -- <paths>` emits `<mode> <type> <sha>\t<path>`
          # per file. Hashing this is content-stable across rebases/squashes.
          # Includes the workflow itself so any CI change forces a full run.
          BACKEND_HASH=$(git ls-tree -r HEAD -- \
            lib priv config test frontend \
            Dockerfile entrypoint.sh \
            mix.exs mix.lock \
            docker-compose.ci.yml docker-compose.ci-local.yml \
            .github/workflows/ci.yml \
            | sha256sum | cut -d' ' -f1)
          # E2E hash mixes plugin SHA so that a plugin-only change invalidates
          # the integration cache without touching the pure-backend cache.
          E2E_HASH=$(printf '%s:%s' "$BACKEND_HASH" "$PLUGIN_SHA" | sha256sum | cut -d' ' -f1)
          echo "backend-hash=$BACKEND_HASH" >> "$GITHUB_OUTPUT"
          echo "e2e-hash=$E2E_HASH" >> "$GITHUB_OUTPUT"
          echo "Backend fingerprint: $BACKEND_HASH"
          echo "E2E fingerprint:     $E2E_HASH (backend + plugin $PLUGIN_SHA)"

      - name: Look up prior backend pass
        id: backend-lookup
        uses: actions/cache/restore@v5
        with:
          path: .ci-fingerprint.marker
          key: ci-pass-${{ steps.compute.outputs.backend-hash }}
          lookup-only: true

      - name: Look up prior e2e pass
        id: e2e-lookup
        uses: actions/cache/restore@v5
        with:
          path: .ci-e2e-fingerprint.marker
          key: ci-e2e-pass-${{ steps.compute.outputs.e2e-hash }}
          lookup-only: true

      - name: Report decision
        run: |
          echo "Backend cache-hit: ${{ steps.backend-lookup.outputs.cache-hit }} (hash ${{ steps.compute.outputs.backend-hash }})"
          echo "E2E cache-hit:     ${{ steps.e2e-lookup.outputs.cache-hit }} (hash ${{ steps.compute.outputs.e2e-hash }})"
          if [ "${{ steps.backend-lookup.outputs.cache-hit }}" = "true" ] && [ "${{ steps.e2e-lookup.outputs.cache-hit }}" = "true" ]; then
            echo "::notice::Both fingerprints already proved green — all test jobs will skip"
          elif [ "${{ steps.backend-lookup.outputs.cache-hit }}" = "true" ]; then
            echo "::notice::Backend already green; only e2e-clerk will run (plugin SHA changed)"
          elif [ "${{ steps.e2e-lookup.outputs.cache-hit }}" = "true" ]; then
            echo "::notice::E2E pairing already green; backend-only jobs will run"
          else
            echo "Neither fingerprint cached — running full test suite"
          fi

  # Build the CI engram image ONCE per CI run. All e2e-* jobs share the
  # same docker daemon on this VM, so a single `docker tag` makes the
  # image visible to every downstream runner without registry push.
  # Image tag = content-stable hash of Dockerfile inputs; identical trees
  # short-circuit via `docker image inspect`.
  prebuild-ci-image:
    needs: fingerprint
    # Image consumed by e2e-clerk (any trigger, gated on e2e-cache-hit) and
    # e2e-local (push/workflow_dispatch only, gated on backend-cache-hit).
    # Build whenever at least one consumer will run.
    if: |
      needs.fingerprint.outputs.e2e-cache-hit != 'true'
      || (github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true')
    runs-on: [self-hosted, linux, x64, isolated]
    outputs:
      image: ${{ steps.tag.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: |
          HASH=$(git ls-tree -r HEAD -- \
            Dockerfile entrypoint.sh \
            mix.exs mix.lock \
            config lib priv frontend \
            | sha256sum | cut -c1-12)
          IMAGE="engram-ci:${HASH}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Image tag: $IMAGE"

      - name: Build image (skip if already cached on this daemon)
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
        run: |
          if docker image inspect "$IMAGE" >/dev/null 2>&1; then
            echo "::notice::Image $IMAGE already cached locally — skipping build"
            exit 0
          fi
          ENGRAM_CI_IMAGE="$IMAGE" \
            docker compose -f docker-compose.ci.yml build engram
          docker image inspect "$IMAGE" >/dev/null
          echo "Built and tagged $IMAGE"

  # Compile Elixir code ONCE in both :dev and :test envs, cache deps and
  # _build artifacts. Downstream jobs (unit-tests, lint, e2e-browser) all
  # do their own `mix compile` today — three redundant compiles of the
  # same 143 source files. This job front-loads the work and exports
  # cache keys; downstream jobs restore via actions/cache before any mix
  # command, making compile incremental (or instant on cache hit).
  prebuild-mix:
    needs: fingerprint
    # Consumed by unit-tests, lint, e2e-browser — all backend-only and skipped
    # on plugin dispatch.
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]
    outputs:
      beam-tag: ${{ steps.beam.outputs.tag }}
      deps-key: ${{ steps.keys.outputs.deps }}
      build-dev-key: ${{ steps.keys.outputs.build-dev }}
      build-test-key: ${{ steps.keys.outputs.build-test }}
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false  # Preserve _build/ + deps/ for incremental compile

      - name: Resolve OTP/Elixir version
        id: beam
        run: |
          OTP=$(erl -eval 'io:format("~s",[erlang:system_info(otp_release)]),halt()' -noshell)
          ERTS=$(erl -eval 'io:format("~s",[erlang:system_info(version)]),halt()' -noshell)
          ELX=$(elixir --short-version)
          echo "tag=otp${OTP}-erts${ERTS}-elx${ELX}" >> "$GITHUB_OUTPUT"

      - name: Compute cache keys
        id: keys
        env:
          BEAM: ${{ steps.beam.outputs.tag }}
        run: |
          # BEAM files are tied to OTP version — include in every key.
          # _build keys hash the source content the compiler actually
          # reads. :test additionally hashes test/** because that's part
          # of its compile scope; :dev does not.
          DEPS_KEY="mix-deps-${BEAM}-${{ hashFiles('mix.lock') }}"
          DEV_KEY="mix-build-dev-${BEAM}-${{ hashFiles('mix.lock', 'lib/**', 'config/**', 'priv/**') }}"
          TEST_KEY="mix-build-test-${BEAM}-${{ hashFiles('mix.lock', 'lib/**', 'config/**', 'priv/**', 'test/**') }}"
          echo "deps=$DEPS_KEY" >> "$GITHUB_OUTPUT"
          echo "build-dev=$DEV_KEY" >> "$GITHUB_OUTPUT"
          echo "build-test=$TEST_KEY" >> "$GITHUB_OUTPUT"

      - name: Cache deps/
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ steps.keys.outputs.deps }}
          restore-keys: mix-deps-${{ steps.beam.outputs.tag }}-

      - name: Cache _build/dev
        id: cache-build-dev
        uses: actions/cache@v5
        with:
          path: _build/dev
          key: ${{ steps.keys.outputs.build-dev }}
          restore-keys: mix-build-dev-${{ steps.beam.outputs.tag }}-

      - name: Cache _build/test
        id: cache-build-test
        uses: actions/cache@v5
        with:
          path: _build/test
          key: ${{ steps.keys.outputs.build-test }}
          restore-keys: mix-build-test-${{ steps.beam.outputs.tag }}-

      - name: Fetch deps (if missing)
        run: |
          if [ ! -d deps ] || [ -z "$(ls -A deps 2>/dev/null)" ]; then
            mix deps.get
          else
            echo "deps/ restored from cache"
          fi

      - name: Compile :dev
        env:
          MIX_ENV: dev
        run: |
          # --warnings-as-errors here means the lint job downstream can
          # skip its own --force compile (cache restore + this proven
          # warning-free build = same guarantee).
          mix compile --warnings-as-errors

      - name: Compile :test
        env:
          MIX_ENV: test
        run: |
          mix compile --warnings-as-errors

  version-check:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require version bump vs main
        run: |
          BRANCH_VERSION=$(grep 'version:' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAIN_VERSION=$(git show origin/main:mix.exs | grep 'version:' | head -1 | sed 's/.*"\(.*\)".*/\1/')

          if [ "$BRANCH_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::mix.exs version ($BRANCH_VERSION) has not been bumped from main. Bump the version before merging."
            exit 1
          fi
          echo "Version bumped: $MAIN_VERSION → $BRANCH_VERSION"

  e2e-clerk:
    needs: [fingerprint, prebuild-ci-image]
    # e2e-clerk is the plugin↔backend contract test. Skip only when this
    # exact (backend, plugin) pair has already passed.
    if: needs.fingerprint.outputs.e2e-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]

    env:
      CI_PROJECT: engram-ci-${{ github.run_id }}
      QDRANT_COLLECTION: ci_test_${{ github.run_id }}
      MARKER_PREFIX: /tmp/ci-${{ github.run_id }}
      E2E_VAULT_PREFIX: /tmp/e2e-vault-${{ github.run_id }}
      E2E_CONFIG_PREFIX: /tmp/e2e-obsidian-config-${{ github.run_id }}
      ENGRAM_CI_IMAGE: ${{ needs.prebuild-ci-image.outputs.image }}

    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ENGRAM_CI_CLIENT_ID }}
          private-key: ${{ secrets.ENGRAM_CI_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: Engram-obsidian-sync

      # ------------------------------------------------------------------
      # Cleanup + checkout (both repos)
      # ------------------------------------------------------------------
      - name: Compute display range for this run
        id: display
        run: |
          # Display range is deterministic per GITHUB_RUN_NUMBER so two parallel
          # runs with different run_numbers (modulo 15) get non-overlapping
          # 6-display windows. Pre-cleanup and tear-down both need this range
          # so they can scope Xvfb kills to displays this run actually owns.
          BASE=$(( (GITHUB_RUN_NUMBER % 15) * 6 + 50 ))
          MIN=$((BASE - 5))
          MAX=$BASE
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "min=$MIN" >> "$GITHUB_OUTPUT"
          echo "max=$MAX" >> "$GITHUB_OUTPUT"
          echo "Display range owned by this run: :$MIN..:$MAX"

      - name: Pre-cleanup stale resources
        env:
          DISPLAY_MIN: ${{ steps.display.outputs.min }}
          DISPLAY_MAX: ${{ steps.display.outputs.max }}
        run: |
          docker compose -f docker-compose.ci.yml -p "$CI_PROJECT" down -v --remove-orphans 2>/dev/null || true
          pkill -9 -f "$E2E_CONFIG_PREFIX" 2>/dev/null || true
          # Orphan Xvfb cleanup is scoped to THIS run's display range only,
          # so a concurrent e2e-clerk on a different run_number bucket isn't
          # killed mid-test. Xvfb processes match via the `:N` arg on the
          # command line; lock files live at /tmp/.X{N}-lock and the socket
          # at /tmp/.X11-unix/X{N}.
          for d in $(seq "$DISPLAY_MIN" "$DISPLAY_MAX"); do
            pkill -9 -f "Xvfb :$d" 2>/dev/null || true
            rm -f "/tmp/.X${d}-lock" "/tmp/.X11-unix/X${d}" 2>/dev/null || true
          done
          sleep 1
          rm -rf ${E2E_VAULT_PREFIX}-* ${E2E_CONFIG_PREFIX}-* ${MARKER_PREFIX}-*
          # Sparse-checkout leak recovery. Cross-repo plugin checkouts and the
          # obsidian-update workflow can leave `core.sparseCheckout=true` and
          # skip-worktree bits on the shared workspace index. `git sparse-checkout
          # disable` clears the config but NOT the index bits, so a subsequent
          # `actions/checkout@v6 --clean:false` lands an empty working tree
          # (mix.exs missing, etc.). Nuke `.git` when poison is detected so the
          # next checkout reclones cleanly. Untracked caches (_build/, deps/,
          # node_modules/) survive — they live outside .git.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false  # Preserve _build/ and deps/ for incremental compilation

      - name: Checkout plugin
        env:
          EXPLICIT_BRANCH: ${{ inputs.plugin_branch || github.event.client_payload.plugin_branch || '' }}
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
          PLUGIN_SHA: ${{ needs.fingerprint.outputs.plugin-sha }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Branch is used only to scope the fetch; the final checkout pins
          # the exact PLUGIN_SHA resolved by the `fingerprint` job. This
          # guarantees the tested commit matches the e2e cache key even if
          # the upstream branch moves between fingerprint and this step.
          # curl (not gh CLI) — engram-isolated runners don't ship gh on PATH.
          if [ -n "$EXPLICIT_BRANCH" ] && [ "$EXPLICIT_BRANCH" != "main" ]; then
            BRANCH="$EXPLICIT_BRANCH"
          elif curl -fsS -o /dev/null \
                 -H "Authorization: Bearer ${GH_TOKEN}" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/engram-app/Engram-obsidian-sync/branches/$CURRENT_BRANCH" 2>/dev/null; then
            BRANCH="$CURRENT_BRANCH"
            echo "🔗 Auto-linked plugin branch: $BRANCH"
          else
            BRANCH="main"
          fi
          echo "Plugin: $BRANCH @ $PLUGIN_SHA"
          if [ -d plugin-src/.git ]; then
            cd plugin-src
            git checkout -- .
            git clean -fd
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "$PLUGIN_SHA"
          else
            git clone --branch "$BRANCH" --single-branch \
              "https://x-access-token:${GH_TOKEN}@github.com/engram-app/Engram-obsidian-sync.git" plugin-src
            cd plugin-src
            git checkout "$PLUGIN_SHA"
          fi

      # ------------------------------------------------------------------
      # Launch ALL long-running prep in parallel (background)
      # ------------------------------------------------------------------
      - name: Allocate dynamic ports
        id: ports
        env:
          DISPLAY_BASE: ${{ steps.display.outputs.base }}
        run: |
          get_free_port() {
            python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()"
          }
          ENGRAM_PORT=$(get_free_port)
          PG_PORT=$(get_free_port)
          # CDP ports: 3 Obsidian instances × 2 xdist workers = 6 ports total.
          # Per-worker env vars (E2E_CDP_PORT_A_W{0,1} etc) are consumed by
          # e2e/conftest.py so dynamic (non-contiguous) allocation is safe.
          CDP_PORT_A_W0=$(get_free_port)
          CDP_PORT_B_W0=$(get_free_port)
          CDP_PORT_C_W0=$(get_free_port)
          CDP_PORT_A_W1=$(get_free_port)
          CDP_PORT_B_W1=$(get_free_port)
          CDP_PORT_C_W1=$(get_free_port)
          # DISPLAY_BASE comes from the earlier "Compute display range" step so
          # pre-cleanup and tear-down can scope Xvfb kills consistently.

          # Validate all ports are non-empty (get_free_port can fail silently)
          for var in ENGRAM_PORT PG_PORT \
                     CDP_PORT_A_W0 CDP_PORT_B_W0 CDP_PORT_C_W0 \
                     CDP_PORT_A_W1 CDP_PORT_B_W1 CDP_PORT_C_W1; do
            if [ -z "${!var}" ]; then
              echo "::error::Port allocation failed for $var"
              exit 1
            fi
          done

          {
            echo "engram_port=$ENGRAM_PORT"
            echo "pg_port=$PG_PORT"
            echo "cdp_port_a_w0=$CDP_PORT_A_W0"
            echo "cdp_port_b_w0=$CDP_PORT_B_W0"
            echo "cdp_port_c_w0=$CDP_PORT_C_W0"
            echo "cdp_port_a_w1=$CDP_PORT_A_W1"
            echo "cdp_port_b_w1=$CDP_PORT_B_W1"
            echo "cdp_port_c_w1=$CDP_PORT_C_W1"
            echo "display_base=$DISPLAY_BASE"
          } >> "$GITHUB_OUTPUT"
          echo "Ports: engram=$ENGRAM_PORT pg=$PG_PORT"
          echo "  w0 cdp: $CDP_PORT_A_W0 $CDP_PORT_B_W0 $CDP_PORT_C_W0"
          echo "  w1 cdp: $CDP_PORT_A_W1 $CDP_PORT_B_W1 $CDP_PORT_C_W1"
          echo "  display base :$DISPLAY_BASE (uses :$DISPLAY_BASE..:$((DISPLAY_BASE-5)))"

      - name: "Background: CI stack + plugin build + Playwright + Ollama + Qdrant"
        env:
          CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
          CLERK_ISSUER: ${{ secrets.CLERK_ISSUER }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CI_ENGRAM_PORT: ${{ steps.ports.outputs.engram_port }}
          CI_PG_PORT: ${{ steps.ports.outputs.pg_port }}
          QDRANT_COLLECTION: ${{ env.QDRANT_COLLECTION }}
        run: |
          # --- CI stack build + start (background) ---
          (
            # Cap Docker build cache (--mount=type=cache grows unbounded)
            docker builder prune --all --keep-storage=2gb -f 2>/dev/null || true

            # Clean up stale CI collection on SlowRaid Qdrant before starting
            curl -sf -X DELETE "http://10.0.20.201:6333/collections/${QDRANT_COLLECTION}" > /dev/null 2>&1 || true

            # Image was already built by the `prebuild-ci-image` job.
            # ENGRAM_CI_IMAGE pins docker-compose.ci.yml's `image:` to that
            # exact tag. `--no-build` makes startup fail loudly if the tag
            # is missing (regression detector vs a silent rebuild).
            docker compose -f docker-compose.ci.yml -p "$CI_PROJECT" up -d --no-build --wait

            # Quick verification — compose --wait already confirmed healthcheck,
            # this just confirms the port mapping is reachable from the host
            for i in $(seq 1 15); do
              if curl -sf "http://localhost:${CI_ENGRAM_PORT}/api/health" > /dev/null 2>&1; then
                echo "CI stack healthy on port ${CI_ENGRAM_PORT}"
                touch "${MARKER_PREFIX}-stack.marker"
                break
              fi
              sleep 1
            done
            if [ ! -f "${MARKER_PREFIX}-stack.marker" ]; then
              echo "ERROR: CI stack failed to start" >&2
              touch "${MARKER_PREFIX}-stack-failed.marker"
            fi
          ) > "${MARKER_PREFIX}-stack.log" 2>&1 &
          echo "CI stack build started (PID $!)"

          # --- Plugin build (background) ---
          (
            if [ -x "$HOME/.bun/bin/bun" ]; then
              echo "bun already installed: $($HOME/.bun/bin/bun --version)"
            else
              curl -fsSL https://bun.sh/install | bash
            fi
            export PATH="$HOME/.bun/bin:$PATH"
            cd plugin-src
            bun install --frozen-lockfile --registry http://10.0.20.214:4873
            bun run build
            # Verify build
            if [ -f main.js ] && [ -f manifest.json ]; then
              touch "${MARKER_PREFIX}-plugin.marker"
              echo "Plugin build OK: $(ls -la main.js)"
            else
              echo "ERROR: Plugin build failed — missing main.js or manifest.json" >&2
              touch "${MARKER_PREFIX}-plugin-failed.marker"
            fi
          ) > "${MARKER_PREFIX}-plugin.log" 2>&1 &
          echo "Plugin build started (PID $!)"

          # --- Playwright install (background) ---
          (
            if python3 -c "from playwright.sync_api import sync_playwright" 2>/dev/null && \
               ls -d "$HOME/.cache/ms-playwright/chromium-"* > /dev/null 2>&1; then
              echo "Playwright + Chromium already installed, skipping"
            else
              pip install 'playwright>=1.48'
              python3 -m playwright install chromium
            fi
            touch "${MARKER_PREFIX}-playwright.marker"
          ) > "${MARKER_PREFIX}-playwright.log" 2>&1 &
          echo "Playwright install started (PID $!)"

          # --- Ollama reachability check (background) ---
          (
            if curl -sf http://10.0.20.214:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama OK"
              touch "${MARKER_PREFIX}-ollama.marker"
            else
              echo "WARNING: Ollama on FastRaid not reachable — embedding tests may fail"
              touch "${MARKER_PREFIX}-ollama-warn.marker"
            fi
          ) > "${MARKER_PREFIX}-ollama.log" 2>&1 &
          echo "Ollama check started (PID $!)"

          # --- Qdrant reachability check (background) ---
          # SlowRaid (10.0.20.201) hosts persistent Qdrant with AVX2 for binary quantization
          (
            if curl -sf http://10.0.20.201:6333/healthz > /dev/null 2>&1; then
              echo "Qdrant OK (SlowRaid AVX2)"
              touch "${MARKER_PREFIX}-qdrant.marker"
            else
              echo "ERROR: Qdrant on SlowRaid not reachable — binary quantization tests will fail"
              touch "${MARKER_PREFIX}-qdrant-failed.marker"
            fi
          ) > "${MARKER_PREFIX}-qdrant.log" 2>&1 &
          echo "Qdrant check started (PID $!)"

      # ------------------------------------------------------------------
      # Wait for all background tasks
      # ------------------------------------------------------------------
      - name: Wait for CI stack + plugin + Playwright + Ollama + Qdrant
        run: |
          echo "Waiting for CI stack..."
          for i in $(seq 1 300); do
            if [ -f "${MARKER_PREFIX}-stack.marker" ]; then echo "CI stack ready"; break; fi
            if [ -f "${MARKER_PREFIX}-stack-failed.marker" ]; then
              echo "CI stack failed to start. Logs:"; cat "${MARKER_PREFIX}-stack.log"; exit 1
            fi
            sleep 1
          done
          if [ ! -f "${MARKER_PREFIX}-stack.marker" ]; then
            echo "CI stack timed out (5 min). Logs:"; cat "${MARKER_PREFIX}-stack.log"; exit 1
          fi

          echo "Waiting for plugin build..."
          for i in $(seq 1 300); do
            if [ -f "${MARKER_PREFIX}-plugin.marker" ]; then echo "Plugin ready"; break; fi
            if [ -f "${MARKER_PREFIX}-plugin-failed.marker" ]; then
              echo "Plugin build failed. Logs:"; cat "${MARKER_PREFIX}-plugin.log"; exit 1
            fi
            sleep 1
          done
          if [ ! -f "${MARKER_PREFIX}-plugin.marker" ]; then
            echo "Plugin build timed out. Logs:"; cat "${MARKER_PREFIX}-plugin.log"; exit 1
          fi

          echo "Waiting for Playwright..."
          for i in $(seq 1 300); do
            if [ -f "${MARKER_PREFIX}-playwright.marker" ]; then echo "Playwright ready"; break; fi
            sleep 1
          done
          if [ ! -f "${MARKER_PREFIX}-playwright.marker" ]; then
            echo "Playwright install timed out. Logs:"; cat "${MARKER_PREFIX}-playwright.log"; exit 1
          fi

          echo "Waiting for Ollama check..."
          for i in $(seq 1 30); do
            if [ -f "${MARKER_PREFIX}-ollama.marker" ] || [ -f "${MARKER_PREFIX}-ollama-warn.marker" ]; then break; fi
            sleep 1
          done
          if [ -f "${MARKER_PREFIX}-ollama-warn.marker" ]; then
            cat "${MARKER_PREFIX}-ollama.log"
          elif [ -f "${MARKER_PREFIX}-ollama.marker" ]; then
            echo "Ollama OK"
          else
            echo "WARNING: Ollama check timed out. Logs:"; cat "${MARKER_PREFIX}-ollama.log" 2>/dev/null || true
          fi

          echo "Waiting for Qdrant check..."
          for i in $(seq 1 15); do
            if [ -f "${MARKER_PREFIX}-qdrant.marker" ]; then echo "Qdrant OK"; break; fi
            if [ -f "${MARKER_PREFIX}-qdrant-failed.marker" ]; then
              echo "ERROR: Qdrant on SlowRaid (10.0.20.201) not reachable. Logs:"
              cat "${MARKER_PREFIX}-qdrant.log"
              exit 1
            fi
            sleep 1
          done
          if [ ! -f "${MARKER_PREFIX}-qdrant.marker" ] && [ ! -f "${MARKER_PREFIX}-qdrant-failed.marker" ]; then
            echo "ERROR: Qdrant check timed out. Logs:"; cat "${MARKER_PREFIX}-qdrant.log" 2>/dev/null || true; exit 1
          fi

          # Add bun to PATH for E2E tests (already installed by plugin build)
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      # ------------------------------------------------------------------
      # API-only tests (run while Obsidian instances boot)
      # ------------------------------------------------------------------
      - name: "Run API-only tests"
        working-directory: e2e
        run: python3 -m pytest tests/api_only/ --ignore=tests/api_only/test_60_local_auth.py -v --timeout=180 -p no:cacheprovider --no-header
        env:
          ENGRAM_API_URL: http://localhost:${{ steps.ports.outputs.engram_port }}/api
          ENGRAM_PLUGIN_SRC: ${{ github.workspace }}/plugin-src
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          AUTH_PROVIDER: clerk
          CI_POSTGRES_CONTAINER: ${{ env.CI_PROJECT }}-postgres-1
          CI_MINIO_CONTAINER: ${{ env.CI_PROJECT }}-minio-1
          QDRANT_URL: http://10.0.20.201:6333
          QDRANT_COLLECTION: ${{ env.QDRANT_COLLECTION }}
          OLLAMA_URL: http://10.0.20.214:11434

      # ------------------------------------------------------------------
      # Obsidian E2E tests
      # ------------------------------------------------------------------
      - name: "Run Obsidian E2E tests"
        if: always()
        working-directory: e2e
        # -n 2 --dist=loadfile: two xdist workers, each owns whole test files
        # (preserves intra-file ordering for test_31 restart + test_50 smoke).
        # E2E_WORKERS defaults to 2 but can be overridden to 1 for rollback.
        run: |
          python3 -m pytest tests/ --ignore=tests/api_only/ \
            -n "${E2E_WORKERS:-2}" --dist=loadfile \
            -v --timeout=300 -p no:cacheprovider --no-header
        env:
          ENGRAM_API_URL: http://localhost:${{ steps.ports.outputs.engram_port }}/api
          ENGRAM_PLUGIN_SRC: ${{ github.workspace }}/plugin-src
          CI_POSTGRES_CONTAINER: ${{ env.CI_PROJECT }}-postgres-1
          CI_MINIO_CONTAINER: ${{ env.CI_PROJECT }}-minio-1
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          AUTH_PROVIDER: clerk
          E2E_VAULT_PREFIX: ${{ env.E2E_VAULT_PREFIX }}
          E2E_CONFIG_PREFIX: ${{ env.E2E_CONFIG_PREFIX }}
          E2E_CDP_PORT_A_W0: ${{ steps.ports.outputs.cdp_port_a_w0 }}
          E2E_CDP_PORT_B_W0: ${{ steps.ports.outputs.cdp_port_b_w0 }}
          E2E_CDP_PORT_C_W0: ${{ steps.ports.outputs.cdp_port_c_w0 }}
          E2E_CDP_PORT_A_W1: ${{ steps.ports.outputs.cdp_port_a_w1 }}
          E2E_CDP_PORT_B_W1: ${{ steps.ports.outputs.cdp_port_b_w1 }}
          E2E_CDP_PORT_C_W1: ${{ steps.ports.outputs.cdp_port_c_w1 }}
          E2E_DISPLAY_BASE: ${{ steps.ports.outputs.display_base }}

      # ------------------------------------------------------------------
      # Report E2E status back to the plugin repo (dispatch only)
      # ------------------------------------------------------------------
      - name: Report E2E status to plugin repo
        if: always() && github.event_name == 'repository_dispatch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHORT_SHA="${{ github.event.client_payload.plugin_ref }}"
          if [ -z "$SHORT_SHA" ]; then
            echo "No plugin_ref in payload, skipping status report"
            exit 0
          fi
          # curl (not gh CLI) — engram-isolated runners don't ship gh on PATH.
          API="https://api.github.com/repos/engram-app/Engram-obsidian-sync"
          AUTH=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json")
          # Resolve to full 40-char SHA (short SHAs from manual dispatches won't work)
          PLUGIN_SHA=$(curl -fsS "${AUTH[@]}" "${API}/commits/${SHORT_SHA}" | jq -r '.sha')
          # Determine overall E2E result from prior steps
          if [ "${{ job.status }}" = "success" ]; then
            STATE="success"
            DESC="E2E tests passed"
          else
            STATE="failure"
            DESC="E2E tests failed"
          fi
          curl -fsS -X POST "${AUTH[@]}" "${API}/statuses/${PLUGIN_SHA}" \
            -d "$(jq -nc --arg state "$STATE" --arg context "backend/e2e" --arg description "$DESC" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                  '{state:$state, context:$context, description:$description, target_url:$target_url}')"

      # ------------------------------------------------------------------
      # Cleanup — MUST kill everything, even on cancel/failure
      # ------------------------------------------------------------------
      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p ci-artifacts
          docker compose -f docker-compose.ci.yml -p "$CI_PROJECT" logs > ci-artifacts/docker-compose.log 2>&1
          cp ${MARKER_PREFIX}-*.log ci-artifacts/ 2>/dev/null || true
          # Pytest detailed log (captures DEBUG+ from all helpers)
          cp e2e/pytest-e2e.log ci-artifacts/ 2>/dev/null || true
          for v in ${E2E_VAULT_PREFIX}-*; do
            [ -d "$v" ] && tar czf "ci-artifacts/$(basename $v).tar.gz" -C /tmp "$(basename $v)" 2>/dev/null || true
          done

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-debug-${{ github.sha }}
          path: ci-artifacts/
          retention-days: 7

      - name: Tear down
        if: always()
        env:
          DISPLAY_MIN: ${{ steps.display.outputs.min }}
          DISPLAY_MAX: ${{ steps.display.outputs.max }}
        run: |
          # Delete this run's Qdrant collection on SlowRaid
          curl -sf -X DELETE "http://10.0.20.201:6333/collections/${QDRANT_COLLECTION}" > /dev/null 2>&1 || true
          # Kill only this run's Obsidian/Xvfb processes (scoped by config dir)
          pkill -9 -f "$E2E_CONFIG_PREFIX" 2>/dev/null || true
          # Xvfb command line doesn't contain $E2E_CONFIG_PREFIX, so kill it
          # by the display number we own. Scope is mandatory now that the
          # workflow can run in parallel — blanket pkill would nuke neighbors.
          for d in $(seq "$DISPLAY_MIN" "$DISPLAY_MAX"); do
            pkill -9 -f "Xvfb :$d" 2>/dev/null || true
          done
          # Wait for processes to die before removing their dirs
          sleep 1
          for d in $(seq "$DISPLAY_MIN" "$DISPLAY_MAX"); do
            rm -f "/tmp/.X${d}-lock" "/tmp/.X11-unix/X${d}" 2>/dev/null || true
          done
          # Remove only this run's temp dirs + marker files
          rm -rf ${E2E_VAULT_PREFIX}-* ${E2E_CONFIG_PREFIX}-* ${MARKER_PREFIX}-*
          # Tear down only this run's Docker stack
          docker compose -f docker-compose.ci.yml -p "$CI_PROJECT" down -v --remove-orphans --rmi local 2>/dev/null || true
          # Prune dangling images + volumes to reclaim disk
          docker image prune -f 2>/dev/null || true
          docker volume prune -f 2>/dev/null || true
          # Keep only the 3 most recent engram-ci cache tags
          docker images --format '{{.Repository}}:{{.Tag}}' --filter "reference=engram-ci:*" \
            | tail -n +4 | xargs -r docker rmi 2>/dev/null || true
          # Clean up ci-artifacts and stale Bun native cache files
          rm -rf ci-artifacts/
          find /tmp -maxdepth 1 -name '.ff*.node' -mmin +60 -delete 2>/dev/null || true

  unit-tests:
    needs: [fingerprint, prebuild-mix]
    # Skip on cross-repo plugin dispatch — plugin can't regress backend ExUnit.
    # Also skip when fingerprint already proved green for this content.
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]

    env:
      PG_CONTAINER: engram-unit-test-${{ github.run_id }}

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          # See comment in e2e-clerk's "Pre-cleanup stale resources" step.
          # `git sparse-checkout disable` does not clear stale skip-worktree
          # bits on the index, so we nuke .git on detected leak to force a
          # fresh clone via the next actions/checkout step.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false  # Preserve _build/ and deps/ for incremental compilation

      - name: Start ephemeral postgres
        id: pg
        run: |
          # Clean up any leftover container from a previous cancelled run
          docker rm -f "$PG_CONTAINER" 2>/dev/null || true

          if [ -n "${LOCAL_REGISTRY:-}" ]; then
            PG_IMAGE="${LOCAL_REGISTRY}/postgres:16-alpine"
            docker pull "$PG_IMAGE" 2>/dev/null || PG_IMAGE="postgres:16-alpine"
          else
            PG_IMAGE="postgres:16-alpine"
          fi

          # `docker run -p 0:5432` races concurrent runners on the shared VM:
          # docker auto-allocates an ephemeral port, but between resolve and
          # bind another runner (or any process) can claim it. Retry the run
          # up to 5 times; each retry gets a fresh allocation.
          for attempt in 1 2 3 4 5; do
            if docker run -d --name "$PG_CONTAINER" \
                -e POSTGRES_USER=engram \
                -e POSTGRES_PASSWORD=engram \
                -e POSTGRES_DB=engram_test \
                -p 0:5432 \
                --health-cmd "pg_isready -U engram" \
                --health-interval 3s \
                --health-timeout 3s \
                --health-retries 10 \
                "$PG_IMAGE"; then
              break
            fi
            echo "Attempt $attempt: docker run failed (likely port race) — cleaning up + retrying"
            docker rm -f "$PG_CONTAINER" 2>/dev/null || true
            sleep 1
            if [ "$attempt" = "5" ]; then
              echo "::error::Postgres container failed to start after 5 attempts"
              exit 1
            fi
          done

          PG_PORT=$(docker port "$PG_CONTAINER" 5432/tcp | head -1 | cut -d: -f2)
          echo "pg_port=$PG_PORT" >> "$GITHUB_OUTPUT"
          echo "Postgres on port $PG_PORT (container: $PG_CONTAINER)"

      # Restore deps + _build/test compiled by `prebuild-mix`. Cache keys
      # are pinned via the prebuild-mix job's outputs, so this restore
      # matches exactly what was just compiled — `mix test` reuses the
      # BEAM files instead of recompiling.
      - name: Restore deps cache
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.prebuild-mix.outputs.deps-key }}
          restore-keys: |
            mix-deps-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Restore _build/test cache
        uses: actions/cache/restore@v5
        with:
          path: _build/test
          key: ${{ needs.prebuild-mix.outputs.build-test-key }}
          restore-keys: |
            mix-build-test-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Verify or fetch deps
        run: |
          if [ ! -d deps ] || [ -z "$(ls -A deps 2>/dev/null)" ]; then
            mix deps.get --only test
          else
            echo "deps/ restored from cache"
          fi

      - name: Run Elixir unit tests
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/engram_test
        run: |
          for i in $(seq 1 30); do
            if docker exec "$PG_CONTAINER" pg_isready -U engram > /dev/null 2>&1; then
              echo "Test DB ready"
              break
            fi
            sleep 1
          done
          MIX_ENV=test mix ecto.create
          MIX_ENV=test mix ecto.migrate
          # Ensure Tailwind binary is valid (cache prune can corrupt native deps)
          mix tailwind.install 2>/dev/null || true
          # --warnings-as-errors treats compile-time warnings in test files
          # (unused aliases, unused vars, etc.) as fatal. Lib warnings are
          # already gated by `mix compile --warnings-as-errors` in the lint
          # job; this extends the same bar to test/**.
          mix test --warnings-as-errors

      - name: Stop ephemeral postgres
        if: always()
        run: docker rm -fv "$PG_CONTAINER" 2>/dev/null || true

      - name: Clean temp files
        if: always()
        run: find /tmp -maxdepth 1 -name '.ff*.node' -mmin +60 -delete 2>/dev/null || true

  lint:
    needs: [fingerprint, prebuild-mix]
    # Skip on cross-repo plugin dispatch — plugin can't regress backend lints.
    # Also skip when fingerprint already proved green.
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false  # Preserve _build/ and deps/ for incremental compilation

      # Restore prebuild-mix caches. deps + _build/dev populate ahead of
      # any mix command, so the redundant compile + deps.get is skipped
      # below. The Compile step then becomes a fast --warnings-as-errors
      # re-validation (no --force; cache was built warnings-clean).
      - name: Restore deps cache
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.prebuild-mix.outputs.deps-key }}
          restore-keys: |
            mix-deps-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Restore _build/dev cache
        uses: actions/cache/restore@v5
        with:
          path: _build/dev
          key: ${{ needs.prebuild-mix.outputs.build-dev-key }}
          restore-keys: |
            mix-build-dev-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Verify or fetch deps
        run: |
          if [ ! -d deps ] || [ -z "$(ls -A deps 2>/dev/null)" ]; then
            mix deps.get
          else
            echo "deps/ restored from cache"
          fi

      - name: Cache Dialyzer PLT
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: ${{ runner.os }}-dialyzer-${{ needs.prebuild-mix.outputs.beam-tag }}-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-dialyzer-${{ needs.prebuild-mix.outputs.beam-tag }}-

      # ── Quality gates ──
      # Phase 1: all checks informational (continue-on-error: true).
      # Phase 2: format + warnings-as-errors → fatal.
      # Phase 3: sobelow → fatal.
      # Phase 4: dialyzer → fatal.
      # Phase 5: credo → fatal.
      # Phase 6: sobelow drops `--skip` (any `#sobelow_skip` annotation in the
      #         tree now surfaces as a finding); sobelow threshold already at
      #         strictest (low). Dialyzer flags already exceed plan target
      #         (Phase 4 added :missing_return + :extra_return on top of
      #         :unmatched_returns, :error_handling, :underspecs). Credo
      #         already strict (config + CLI). Deferred: Readability.Specs
      #         (~225 public funs need real type info — separate ratchet PR)
      #         and Design.DuplicatedCode (~13 findings, mostly Phoenix
      #         controller setup repeats — high noise at default mass=40).

      - name: Format check
        run: mix format --check-formatted

      - name: Compile warnings-as-errors
        # No --force: _build/dev was restored from prebuild-mix which
        # already compiled with --warnings-as-errors. This re-runs as a
        # safety net (incremental no-op when nothing changed).
        run: mix compile --warnings-as-errors

      - name: Credo (strict)
        run: mix credo --strict

      - name: Sobelow
        run: mix sobelow --exit low

      - name: Dialyzer
        run: |
          mkdir -p priv/plts
          mix dialyzer --quiet

  e2e-local:
    needs: [fingerprint, prebuild-ci-image]
    # Skip on cross-repo plugin dispatch — plugin uses Clerk JWTs in production,
    # so the local-auth API path is backend-internal.
    # Also skip when fingerprint already proved green.
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]

    env:
      CI_PROJECT: engram-ci-local-${{ github.run_id }}
      QDRANT_COLLECTION: ci_local_${{ github.run_id }}
      ENGRAM_CI_IMAGE: ${{ needs.prebuild-ci-image.outputs.image }}

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          # See comment in e2e-clerk's "Pre-cleanup stale resources" step.
          # `git sparse-checkout disable` does not clear stale skip-worktree
          # bits on the index, so we nuke .git on detected leak to force a
          # fresh clone via the next actions/checkout step.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false

      - name: Allocate dynamic ports
        id: ports
        run: |
          get_free_port() {
            python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()"
          }
          ENGRAM_PORT=$(get_free_port)
          PG_PORT=$(get_free_port)
          for var in ENGRAM_PORT PG_PORT; do
            if [ -z "${!var}" ]; then
              echo "::error::Port allocation failed for $var"
              exit 1
            fi
          done
          echo "engram_port=$ENGRAM_PORT" >> "$GITHUB_OUTPUT"
          echo "pg_port=$PG_PORT" >> "$GITHUB_OUTPUT"
          echo "Ports: engram=$ENGRAM_PORT pg=$PG_PORT"

      - name: Start CI stack (local auth)
        env:
          CI_ENGRAM_PORT: ${{ steps.ports.outputs.engram_port }}
          CI_PG_PORT: ${{ steps.ports.outputs.pg_port }}
          QDRANT_COLLECTION: ${{ env.QDRANT_COLLECTION }}
        run: |
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" down -v --remove-orphans 2>/dev/null || true

          # Clean up stale Qdrant collection
          curl -sf -X DELETE "http://10.0.20.201:6333/collections/${QDRANT_COLLECTION}" > /dev/null 2>&1 || true

          # Image was already built by `prebuild-ci-image`. ENGRAM_CI_IMAGE
          # pins docker-compose.ci.yml's `image:` to that tag and --no-build
          # fails loudly if missing instead of silently rebuilding.
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" up -d --no-build --wait

          # Wait for health
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:${CI_ENGRAM_PORT}/api/health" > /dev/null 2>&1; then
              echo "Local auth stack healthy on port ${CI_ENGRAM_PORT}"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Local auth stack failed to start"
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" logs
          exit 1

      - name: Run local auth API tests
        working-directory: e2e
        env:
          ENGRAM_API_URL: http://localhost:${{ steps.ports.outputs.engram_port }}/api
          AUTH_PROVIDER: local
          CI_POSTGRES_CONTAINER: ${{ env.CI_PROJECT }}-postgres-1
          CI_MINIO_CONTAINER: ${{ env.CI_PROJECT }}-minio-1
          QDRANT_URL: http://10.0.20.201:6333
          QDRANT_COLLECTION: ${{ env.QDRANT_COLLECTION }}
          OLLAMA_URL: http://10.0.20.214:11434
        run: python3 -m pytest tests/api_only/ -v --timeout=180 -p no:cacheprovider --no-header

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p ci-artifacts-local
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" logs > ci-artifacts-local/docker-compose.log 2>&1

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-local-auth-debug-${{ github.sha }}
          path: ci-artifacts-local/
          retention-days: 7

      - name: Tear down
        if: always()
        run: |
          curl -sf -X DELETE "http://10.0.20.201:6333/collections/${QDRANT_COLLECTION}" > /dev/null 2>&1 || true
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" down -v --remove-orphans --rmi local 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
          rm -rf ci-artifacts-local/
          find /tmp -maxdepth 1 -name '.ff*.node' -mmin +60 -delete 2>/dev/null || true

  e2e-browser:
    needs: [fingerprint, prebuild-mix]
    # Skip on cross-repo plugin dispatch — Playwright targets backend's React
    # frontend, which the plugin (separate repo) cannot affect.
    # Also skip when fingerprint already proved green.
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]

    env:
      PG_CONTAINER: engram-e2e-browser-${{ github.run_id }}

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          # See comment in e2e-clerk's "Pre-cleanup stale resources" step.
          # `git sparse-checkout disable` does not clear stale skip-worktree
          # bits on the index, so we nuke .git on detected leak to force a
          # fresh clone via the next actions/checkout step.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false

      # Restore prebuild-mix caches so `mix phx.server` (spawned by
      # Playwright's webServer config) reuses compiled BEAM files
      # instead of recompiling at boot.
      - name: Restore deps cache
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.prebuild-mix.outputs.deps-key }}
          restore-keys: |
            mix-deps-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Restore _build/dev cache
        uses: actions/cache/restore@v5
        with:
          path: _build/dev
          key: ${{ needs.prebuild-mix.outputs.build-dev-key }}
          restore-keys: |
            mix-build-dev-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Allocate dynamic ports
        id: ports
        run: |
          get_free_port() {
            python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()"
          }
          PW_LOCAL_BACKEND_PORT=$(get_free_port)
          PW_LOCAL_VITE_PORT=$(get_free_port)
          PW_CLERK_BACKEND_PORT=$(get_free_port)
          PW_CLERK_VITE_PORT=$(get_free_port)

          for var in PW_LOCAL_BACKEND_PORT PW_LOCAL_VITE_PORT PW_CLERK_BACKEND_PORT PW_CLERK_VITE_PORT; do
            if [ -z "${!var}" ]; then
              echo "::error::Port allocation failed for $var"
              exit 1
            fi
          done

          echo "pw_local_backend_port=$PW_LOCAL_BACKEND_PORT" >> "$GITHUB_OUTPUT"
          echo "pw_local_vite_port=$PW_LOCAL_VITE_PORT" >> "$GITHUB_OUTPUT"
          echo "pw_clerk_backend_port=$PW_CLERK_BACKEND_PORT" >> "$GITHUB_OUTPUT"
          echo "pw_clerk_vite_port=$PW_CLERK_VITE_PORT" >> "$GITHUB_OUTPUT"
          echo "Ports: local=$PW_LOCAL_BACKEND_PORT/$PW_LOCAL_VITE_PORT clerk=$PW_CLERK_BACKEND_PORT/$PW_CLERK_VITE_PORT"

      - name: Start ephemeral postgres
        id: pg
        run: |
          docker rm -f "$PG_CONTAINER" 2>/dev/null || true
          if [ -n "${LOCAL_REGISTRY:-}" ]; then
            PG_IMAGE="${LOCAL_REGISTRY}/postgres:16-alpine"
            docker pull "$PG_IMAGE" 2>/dev/null || PG_IMAGE="postgres:16-alpine"
          else
            PG_IMAGE="postgres:16-alpine"
          fi
          # Retry on ephemeral-port race with sibling runners (see unit-tests).
          for attempt in 1 2 3 4 5; do
            if docker run -d --name "$PG_CONTAINER" \
                -e POSTGRES_USER=engram \
                -e POSTGRES_PASSWORD=engram \
                -e POSTGRES_DB=engram_dev \
                -p 0:5432 \
                --health-cmd "pg_isready -U engram" \
                --health-interval 3s \
                --health-timeout 3s \
                --health-retries 10 \
                "$PG_IMAGE"; then
              break
            fi
            echo "Attempt $attempt: docker run failed (likely port race) — cleaning up + retrying"
            docker rm -f "$PG_CONTAINER" 2>/dev/null || true
            sleep 1
            if [ "$attempt" = "5" ]; then
              echo "::error::Postgres container failed to start after 5 attempts"
              exit 1
            fi
          done
          PG_PORT=$(docker port "$PG_CONTAINER" 5432/tcp | head -1 | cut -d: -f2)
          echo "pg_port=$PG_PORT" >> "$GITHUB_OUTPUT"
          echo "Postgres on port $PG_PORT"

      - name: Setup Elixir deps + DB
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/engram_dev
        run: |
          # deps/ already restored from prebuild-mix cache; fetch only if
          # restore missed (first-ever run for this mix.lock content).
          if [ ! -d deps ] || [ -z "$(ls -A deps 2>/dev/null)" ]; then
            mix deps.get
          fi
          for i in $(seq 1 30); do
            if docker exec "$PG_CONTAINER" pg_isready -U engram > /dev/null 2>&1; then
              echo "DB ready"; break
            fi
            sleep 1
          done
          mix ecto.create
          mix ecto.migrate
          # Ensure Tailwind binary is valid (cache prune can corrupt native deps).
          # Mirror of unit-tests fix — Playwright's webServer boots Phoenix
          # which boots Tailwind, and a corrupt :eacces binary kills the boot.
          mix tailwind.install 2>/dev/null || true

      - name: Install frontend deps + Playwright
        working-directory: frontend
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun install --frozen-lockfile --registry http://10.0.20.214:4873
          bunx playwright install chromium

      - name: Run Playwright tests
        working-directory: frontend
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/engram_dev
          JWT_SECRET: test-e2e-browser-secret
          # Phoenix backend spawned by Playwright's webServer inherits this
          # env. Without an override, :rate_limit_auth defaults to 10 req/60s
          # and the local-auth + dark-mode + mobile suites collectively burst
          # past it on /api/auth/register → 429s. Matches the value already
          # set in docker-compose.ci-local.yml for the e2e-local job.
          RATE_LIMIT_AUTH_OVERRIDE: "1000"
          PW_LOCAL_BACKEND_PORT: ${{ steps.ports.outputs.pw_local_backend_port }}
          PW_LOCAL_VITE_PORT: ${{ steps.ports.outputs.pw_local_vite_port }}
          PW_CLERK_BACKEND_PORT: ${{ steps.ports.outputs.pw_clerk_backend_port }}
          PW_CLERK_VITE_PORT: ${{ steps.ports.outputs.pw_clerk_vite_port }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
          CLERK_ISSUER: ${{ secrets.CLERK_ISSUER }}
          CI: "true"
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bunx playwright test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts-${{ github.sha }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

      - name: Tear down
        if: always()
        run: |
          docker rm -fv "$PG_CONTAINER" 2>/dev/null || true
          find /tmp -maxdepth 1 -name '.ff*.node' -mmin +60 -delete 2>/dev/null || true

  ci:
    if: always() && (needs.fingerprint.outputs.backend-cache-hit != 'true' || needs.fingerprint.outputs.e2e-cache-hit != 'true')
    needs: [fingerprint, version-check, unit-tests, lint, e2e-clerk, e2e-local, e2e-browser]
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          VC="${{ needs.version-check.result }}"
          UT="${{ needs.unit-tests.result }}"
          LN="${{ needs.lint.result }}"
          EC="${{ needs.e2e-clerk.result }}"
          EL="${{ needs.e2e-local.result }}"
          EB="${{ needs.e2e-browser.result }}"

          # version-check is skipped on main (only runs on branches) — that's expected.
          if [ "$VC" != "success" ] && [ "$VC" != "skipped" ]; then
            echo "::error::version-check failed — bump mix.exs version before merging"
            exit 1
          fi

          # e2e-clerk is the only job that exercises the plugin↔backend contract,
          # so it must succeed regardless of trigger.
          if [ "$EC" != "success" ]; then
            echo "::error::e2e-clerk failed: $EC"
            exit 1
          fi

          # On cross-repo plugin dispatch (plugin-e2e-trigger), unit-tests / lint /
          # e2e-local / e2e-browser are intentionally skipped — plugin cannot regress
          # backend internals. Only assert success when those jobs actually ran.
          for pair in "unit-tests=$UT" "lint=$LN" "e2e-local=$EL" "e2e-browser=$EB"; do
            name="${pair%=*}"; result="${pair#*=}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::$name failed: $result"
              exit 1
            fi
          done

  # Cache BOTH green-CI fingerprints so the next run with the same content
  # (typically the squash-merge to main) can skip the relevant slice.
  #   - backend-hash cache:  unit-tests / lint / e2e-local / e2e-browser
  #   - e2e-hash cache:      e2e-clerk (the (backend, plugin) pairing)
  # On plugin dispatch, ONLY e2e-clerk ran — skip backend marker save in
  # that case to avoid recording a green for jobs that didn't execute.
  record-pass:
    if: always() && needs.ci.result == 'success'
    needs: [fingerprint, ci]
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - name: Write backend fingerprint marker
        if: github.event_name != 'repository_dispatch'
        run: echo "passed at $(date -u +%FT%TZ) on ${GITHUB_SHA}" > .ci-fingerprint.marker
      - name: Save backend marker to cache
        if: github.event_name != 'repository_dispatch'
        uses: actions/cache/save@v5
        with:
          path: .ci-fingerprint.marker
          key: ci-pass-${{ needs.fingerprint.outputs.backend-hash }}

      - name: Write e2e fingerprint marker
        run: echo "passed at $(date -u +%FT%TZ) on ${GITHUB_SHA} (plugin ${{ needs.fingerprint.outputs.plugin-sha }})" > .ci-e2e-fingerprint.marker
      - name: Save e2e marker to cache
        uses: actions/cache/save@v5
        with:
          path: .ci-e2e-fingerprint.marker
          key: ci-e2e-pass-${{ needs.fingerprint.outputs.e2e-hash }}

  # When plugin dispatch arrives and the (backend, plugin) pair is already
  # cached green, e2e-clerk is skipped — its in-job "Report E2E status to
  # plugin repo" step therefore does NOT run, leaving the plugin PR with no
  # commit status. This job posts that success directly from the cached pass.
  report-cached-pass-to-plugin:
    if: github.event_name == 'repository_dispatch' && needs.fingerprint.outputs.e2e-cache-hit == 'true'
    needs: fingerprint
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ENGRAM_CI_CLIENT_ID }}
          private-key: ${{ secrets.ENGRAM_CI_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: Engram-obsidian-sync

      - name: Report cached e2e pass to plugin repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHORT_SHA: ${{ github.event.client_payload.plugin_ref }}
        run: |
          if [ -z "$SHORT_SHA" ]; then
            echo "No plugin_ref in payload, skipping status report"
            exit 0
          fi
          PLUGIN_SHA=$(gh api "repos/engram-app/Engram-obsidian-sync/commits/${SHORT_SHA}" --jq '.sha')
          gh api "repos/engram-app/Engram-obsidian-sync/statuses/${PLUGIN_SHA}" \
            -f state="success" \
            -f context="backend/e2e" \
            -f description="E2E tests passed (cached fingerprint match)" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy-fastraid:
    # Deploy when EITHER (a) full CI just succeeded OR (b) BOTH fingerprints
    # already proved green for this content. Both must be cached, because
    # backend-only validation is insufficient — we also need the (backend,
    # plugin) integration to be known green. Branch protection should still
    # require the `ci` check on PRs; this only kicks in on the main push
    # whose tree has been validated upstream.
    if: |
      always()
      && github.ref == 'refs/heads/main'
      && github.event_name == 'push'
      && (needs.ci.result == 'success' || (needs.fingerprint.outputs.backend-cache-hit == 'true' && needs.fingerprint.outputs.e2e-cache-hit == 'true'))
    needs: [fingerprint, ci]
    runs-on: [self-hosted, linux, x64, isolated]
    permissions:
      packages: write
      contents: read
      id-token: write   # required by actions/github-script to mint OIDC JWTs for engram-deployer

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          # See comment in e2e-clerk's "Pre-cleanup stale resources" step.
          # `git sparse-checkout disable` does not clear stale skip-worktree
          # bits on the index, so we nuke .git on detected leak to force a
          # fresh clone via the next actions/checkout step.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6

      - name: Extract and validate version
        id: version
        run: |
          VERSION=$(grep 'version:' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid semver in mix.exs: '$VERSION'" >&2
            exit 1
          fi

          IMAGE_LC="ghcr.io/${{ github.repository_owner }}/engram"
          IMAGE_LC=$(echo "$IMAGE_LC" | tr '[:upper:]' '[:lower:]')

          # Check whether this version already exists in GHCR.
          #
          # Policy:
          #   first-attempt + exists  → ERROR (developer forgot to bump version)
          #   rerun        + exists  → SKIP build, proceed straight to deploy
          #                            (this is the recovery path when an
          #                            earlier attempt built+pushed but failed
          #                            at deploy time — e.g. the IP-allowlist
          #                            NAT issue, a transient daemon outage)
          #   first or rerun + missing → BUILD + PUSH + DEPLOY as normal
          #
          # github.run_attempt is 1 on the first push-triggered run, 2+ on
          # any `gh run rerun` invocation. Cleanly distinguishes "operator
          # didn't bump" from "operator is retrying a known-good build".
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin > /dev/null
          IMAGE_EXISTS=false
          if docker manifest inspect "${IMAGE_LC}:${VERSION}" > /dev/null 2>&1; then
            if [ "${{ github.run_attempt }}" = "1" ]; then
              echo "ERROR: Version ${VERSION} already exists in GHCR. Bump the version in mix.exs before merging." >&2
              exit 1
            fi
            echo "::notice::Image ${IMAGE_LC}:${VERSION} already in GHCR (run_attempt=${{ github.run_attempt }}); skipping build, jumping to deploy."
            IMAGE_EXISTS=true
          fi

          SHA_SHORT="${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE_LC" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "image_exists=$IMAGE_EXISTS" >> "$GITHUB_OUTPUT"
          if [ "$IMAGE_EXISTS" = "true" ]; then
            echo "Version ${VERSION} already built; will skip build + push."
          else
            echo "Version ${VERSION} is new — proceeding with build."
          fi

      # Host daemon on the runner has Docker 29's containerd-snapshotter enabled,
      # whose push client hits GHCR with `405 Not Allowed` on /blobs/uploads/.
      # docker-container driver runs buildkit in an isolated container with its
      # own push path, sidestepping the host daemon entirely.
      - name: Set up Docker Buildx
        if: steps.version.outputs.image_exists != 'true'
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Login to GHCR
        if: steps.version.outputs.image_exists != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Local FS cache on the self-hosted runner — bounded by disk speed
      # instead of GHCR latency. The old registry cache fetched every layer
      # over HTTPS on every build; local cache is ~10× faster for cache hits.
      - name: Restore buildx cache
        if: steps.version.outputs.image_exists != 'true'
        uses: actions/cache@v5
        with:
          path: /tmp/buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('Dockerfile', 'mix.lock', 'frontend/bun.lock') }}
          restore-keys: |
            buildx-${{ runner.os }}-

      - name: Build and push image
        if: steps.version.outputs.image_exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64
          cache-from: type=local,src=/tmp/buildx-cache
          cache-to: type=local,dest=/tmp/buildx-cache-new,mode=max
          tags: |
            ${{ steps.version.outputs.image }}:latest
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.sha_short }}

      # Atomically swap new cache over old. actions/cache@v5 has no built-in
      # rotation; without this step the cache grows unbounded across runs.
      - name: Rotate buildx cache
        if: steps.version.outputs.image_exists != 'true' && always()
        run: |
          if [ -d /tmp/buildx-cache-new ]; then
            rm -rf /tmp/buildx-cache
            mv /tmp/buildx-cache-new /tmp/buildx-cache
          fi

      # ── Pull-based deploy via engram-deployer on FastRaid ────────────────
      # Replaces the old "SSH as root + run a shell script" pattern. Runner
      # mints a per-job OIDC JWT (aud=engram-deploy) and POSTs to the
      # daemon, which validates the signature against GitHub's JWKS, pins
      # repository/ref/workflow_ref, and runs the deploy locally on
      # FastRaid. Runner holds zero long-lived credentials.
      #
      # Requires repo secret DEPLOYER_CERT_PEM (capture from FastRaid post
      # plugin install: `openssl x509 -in /boot/config/plugins/
      # engram-deployer/cert.pem`). Cert is self-signed ed25519, 10-year
      # validity — won't churn.
      - name: Mint GitHub OIDC token (aud=engram-deploy)
        id: oidc
        uses: actions/github-script@v8
        with:
          script: |
            const token = await core.getIDToken('engram-deploy');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Write pinned deployer cert
        env:
          DEPLOYER_CERT_PEM: ${{ secrets.DEPLOYER_CERT_PEM }}
        run: |
          if [ -z "$DEPLOYER_CERT_PEM" ]; then
            echo "ERROR: DEPLOYER_CERT_PEM secret not set" >&2
            echo "Capture from FastRaid: ssh root@10.0.20.214 'cat /boot/config/plugins/engram-deployer/cert.pem'" >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOYER_CERT_PEM" > ${RUNNER_TEMP}/deployer-cert.pem
          # Sanity-check it parses as a cert before we use it for TLS.
          openssl x509 -in ${RUNNER_TEMP}/deployer-cert.pem -noout -subject -fingerprint -sha256

      - name: Deploy via engram-deployer
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_SHORT="${{ steps.version.outputs.sha_short }}"

          # tee lets us stream events to the CI log AND capture the body
          # for terminal-line status parsing.
          set -o pipefail
          curl -sS -X POST \
            --cacert ${RUNNER_TEMP}/deployer-cert.pem \
            --max-time 600 \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"${VERSION}\",\"sha\":\"${SHA_SHORT}\"}" \
            https://10.0.20.214:8443/deploy \
            | tee ${RUNNER_TEMP}/deploy-stream.ndjson

          # Last non-empty line is the DeployResult.
          RESULT=$(grep -v '^$' ${RUNNER_TEMP}/deploy-stream.ndjson | tail -n 1)
          STATUS=$(printf '%s' "$RESULT" | python3 -c 'import json,sys; print(json.loads(sys.stdin.read()).get("status",""))')

          if [ "$STATUS" != "ok" ]; then
            echo ""
            echo "::error::Deploy failed; terminal line:"
            echo "$RESULT"
            exit 1
          fi
          echo "Deploy reported ok by engram-deployer"

      - name: Verify deployment from CI runner
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Two containers, two ports. Both must report the new version.
          declare -A TARGETS=(
            [engram-saas]=8000
            [engram-selfhost]=8001
          )

          for name in "${!TARGETS[@]}"; do
            port="${TARGETS[$name]}"
            echo "==> Verifying ${name} on port ${port}"

            ok=false
            for i in $(seq 1 15); do
              HEALTH=$(curl -sf "http://10.0.20.214:${port}/api/health" 2>/dev/null || true)
              if [ -n "$HEALTH" ]; then
                RUNNING=$(echo "$HEALTH" | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
                if [ "$RUNNING" = "$VERSION" ]; then
                  echo "${name}: ${VERSION} is healthy"
                  ok=true
                  break
                else
                  echo "${name}: version mismatch (expected ${VERSION}, got ${RUNNING:-no response})"
                fi
              fi
              sleep 2
            done

            if [ "$ok" != "true" ]; then
              echo "ERROR: FastRaid deploy failed — ${name} not running ${VERSION} after 30s"
              exit 1
            fi
          done

          echo "FastRaid deploy verified — both engram containers running ${VERSION}"
